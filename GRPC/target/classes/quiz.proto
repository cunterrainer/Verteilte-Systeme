syntax = "proto3";

package quiz;

option java_package = "quiz.grpc";
option java_multiple_files = true;
option java_outer_classname = "QuizProto";

service QuizService {
  rpc Hello(HelloRequest) returns (HelloResponse);
  rpc Quit(QuitRequest) returns (QuitResponse);
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse);
  rpc CreateRoom(CreateRoomRequest) returns (RoomActionResponse);
  rpc JoinRoom(JoinRoomRequest) returns (RoomActionResponse);
  rpc LeaveRoom(LeaveRoomRequest) returns (RoomActionResponse);
  rpc Ready(ReadyRequest) returns (ReadyResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc StreamRoomEvents(SubscribeRequest) returns (stream RoomEvent);
  rpc StreamGameEvents(SubscribeRequest) returns (stream GameEvent);
}

message HelloRequest {
  string username = 1;
}

message HelloResponse {
  bool success = 1;
  string error = 2;
}

message QuitRequest {
  string username = 1;
}

message QuitResponse {
  bool success = 1;
  string error = 2;
}

message ListRoomsRequest {
  string username = 1;
}

message RoomInfo {
  string room_id = 1;
  string room_name = 2;
  int32 player_count = 3;
}

message ListRoomsResponse {
  repeated RoomInfo rooms = 1;
  string error = 2;
}

message CreateRoomRequest {
  string username = 1;
  string room_name = 2;
}

message JoinRoomRequest {
  string username = 1;
  string room_id = 2;
}

message LeaveRoomRequest {
  string username = 1;
}

message RoomActionResponse {
  bool success = 1;
  string error = 2;
  string room_id = 3;
}

message ReadyRequest {
  string username = 1;
}

message ReadyResponse {
  bool success = 1;
  bool game_started = 2;
  string error = 3;
}

message SubmitAnswerRequest {
  string username = 1;
  string answer = 2;
}

message SubmitAnswerResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    ACCEPTED = 1;
    INVALID_STATE = 2;
    INVALID_OPTION = 3;
    ALREADY_ANSWERED = 4;
    NOT_IN_ROOM = 5;
  }

  Status status = 1;
  string error = 2;
}

message SubscribeRequest {
  string username = 1;
}

message RoomEvent {
  enum Type {
    ROOM_EVENT_UNSPECIFIED = 0;
    ROOM_JOINED = 1;
    ROOM_UPDATED = 2;
    ROOM_LEFT = 3;
  }

  Type type = 1;
  string room_id = 2;
  int32 player_count = 3;
  int32 ready_count = 4;
  string message = 5;
}

message QuestionPayload {
  int32 id = 1;
  string text = 2;
  string option_a = 3;
  string option_b = 4;
  string option_c = 5;
  string option_d = 6;
}

message GameEvent {
  enum Type {
    GAME_EVENT_UNSPECIFIED = 0;
    GAME_STARTING = 1;
    ROUND_START = 2;
    ROUND_RESULT = 3;
    SCOREBOARD = 4;
    GAME_OVER = 5;
    ROOM_CLOSED = 6;
    ERROR = 7;
  }

  Type type = 1;
  string room_id = 2;
  int32 round_number = 3;
  int32 round_seconds = 4;
  QuestionPayload question = 5;
  string correct_option = 6;
  string first_correct_user = 7;
  string explanation = 8;
  string scoreboard = 9;
  string message = 10;
}
